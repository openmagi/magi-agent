name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    # The default-ON flag work (no-default-off policy) exercises materially more
    # of the runtime in every test, so the full serial suite grew to ~45 min and
    # began tripping the old 45-min cap even after the worker-leak wedge fix
    # (#1275). Give headroom; a proper follow-up is pytest-xdist parallelization
    # (add pytest-xdist to the dev extra + `-n auto` here) once the suite is
    # audited for parallel-safety, which would cut this back well under 30 min.
    timeout-minutes: 70
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ matrix.python-version }}
      - name: Sync deps (dev + cli extras)
        run: uv sync --python ${{ matrix.python-version }} --extra dev --extra cli
      - name: Run tests
        env:
          # Hermetic: never read a developer/CI host ~/.magi/config.toml
          MAGI_CONFIG: ${{ runner.temp }}/magi-ci-config.toml
        run: uv run --no-sync pytest -q

  ws1-durable-on-path:
    # WS1 PR1e: mandatory ON-path job (flag-promotion rule; "OFF is
    # byte-identical" is necessary but not sufficient, ref incident #641). Runs
    # the WS1 durable suite with the durable / work-queue flags ON in a hermetic,
    # env-cleared run so Kevin's exported MAGI_* + provider keys cannot give a
    # false green (R4). A second run additionally flips the OPTIONAL
    # MAGI_DURABLE_FOREGROUND_CONTINUATION_ENABLED on so the context-only
    # continuation path is covered too.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps (dev + cli extras)
        run: uv sync --python 3.12 --extra dev --extra cli
      - name: WS1 durable suite (ON-path, hermetic, env-cleared)
        # ``env -i`` drops every inherited MAGI_* / provider key, then we set
        # ONLY the WS1 flags ON (an explicit allowlist). MAGI_CLI_SESSION_LOG_ENABLED
        # is the Envelope-log TEXT source for the context-only foreground resume
        # (NOT the obs MAGI_SESSION_TRANSCRIPT_ENABLED); MAGI_EVIDENCE_LEDGER_LIFECYCLE_ENABLED
        # is the shipped-profile value the armed-gate digest test requires.
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_DURABLE_LOCAL_WRITES_ENABLED=1
          MAGI_DURABLE_CHECKPOINTS_ENABLED=1
          MAGI_DURABLE_STARTUP_RECOVERY_ENABLED=1
          MAGI_WORK_QUEUE_EXECUTOR_ENABLED=1
          MAGI_CLI_SESSION_LOG_ENABLED=1
          MAGI_EVIDENCE_LEDGER_LIFECYCLE_ENABLED=1
          uv run --no-sync pytest -q
          tests/test_ws1_durable_activation.py
          tests/test_durable_checkpoint_store.py
          tests/test_durable_checkpoint_emitter.py
          tests/test_durable_recovery_sweep.py
          tests/test_durable_side_effects.py
          tests/test_work_queue_boot_reclaim.py
      - name: WS1 durable suite (ON-path + foreground continuation)
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_DURABLE_LOCAL_WRITES_ENABLED=1
          MAGI_DURABLE_CHECKPOINTS_ENABLED=1
          MAGI_DURABLE_STARTUP_RECOVERY_ENABLED=1
          MAGI_DURABLE_FOREGROUND_CONTINUATION_ENABLED=1
          MAGI_WORK_QUEUE_EXECUTOR_ENABLED=1
          MAGI_CLI_SESSION_LOG_ENABLED=1
          MAGI_EVIDENCE_LEDGER_LIFECYCLE_ENABLED=1
          uv run --no-sync pytest -q
          tests/test_ws1_durable_activation.py
          tests/test_durable_recovery_sweep.py

  ws5-empty-response-onpath:
    # WS5 PR5a/PR5b: mandatory ON-path job (flag-promotion rule, ref #641). Runs
    # the empty-response recovery + escalation suites with the flags ON in a
    # hermetic env-cleared run so an exported MAGI_* / provider key cannot give a
    # false green.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps (dev + cli extras)
        run: uv sync --python 3.12 --extra dev --extra cli
      - name: WS5 engine + pure-helper suites (ON-path, both flags exported)
        # The engine FakeRunner tests exercise the ON path; the pure-helper /
        # env-parse tests build explicit env dicts so the exported flags do not
        # perturb their OFF assertions. The escalation-OFF engine test
        # monkeypatch.delenv's the escalation flag itself.
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_EMPTY_RESPONSE_RECOVERY_ENABLED=1
          MAGI_EMPTY_RESPONSE_ESCALATION_ENABLED=1
          uv run --no-sync pytest -q
          tests/cli/test_engine_empty_response_recovery.py
          tests/cli/test_engine_empty_response_escalation.py
          tests/runtime/test_empty_response_recovery.py
      - name: WS5 profile/parse suites (NO flags exported; tests own their env)
        # These assert OFF / byte-identical profile behavior; running them under
        # the process-wide ON env could leak into any test that falls through to
        # os.environ, so they run in a separate step with no flags set.
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          uv run --no-sync pytest -q
          tests/test_ws5_empty_response_activation.py
          tests/runtime/test_empty_response_recovery_lab_default.py
          tests/test_hosted_defaults.py

  ws9-mcp-resilience-onpath:
    # WS9 PR9c: mandatory ON-path job (flag-promotion rule, ref #641). Runs the
    # MCP resilience activation + primitive + live composio seam suites with
    # MAGI_MCP_RESILIENCE_ENABLED ON in a hermetic env-cleared run so an exported
    # MAGI_* / provider key cannot give a false green.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps (dev + cli extras)
        run: uv sync --python 3.12 --extra dev --extra cli
      - name: WS9 MCP resilience (ON-path, hermetic, env-cleared)
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_MCP_RESILIENCE_ENABLED=1
          uv run --no-sync pytest -q
          tests/test_ws9_mcp_resilience_activation.py
          tests/plugins/test_mcp_resilience.py
          tests/composio/test_mcp_guarded_resilience.py

  ws8-telegram-resilience-onpath:
    # WS8 PR8a-3: mandatory ON-path job (flag-promotion rule, ref #641). Runs the
    # poll-resilience suites with MAGI_TELEGRAM_POLL_RESILIENCE_ENABLED ON in a
    # hermetic env-cleared run so an exported MAGI_* / provider key cannot give a
    # false green. The activation test asserts the profile overlays set the flag;
    # the policy + watcher suites assert backoff / circuit / persistent-notice
    # fire end-to-end with the flag ON.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps (dev + cli extras)
        run: uv sync --python 3.12 --extra dev --extra cli
      - name: WS8 telegram poll resilience (ON-path, hermetic, env-cleared)
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_TELEGRAM_POLL_RESILIENCE_ENABLED=1
          uv run --no-sync pytest -q
          tests/test_ws8_telegram_resilience_activation.py
          tests/test_poll_resilience.py
          tests/test_channel_poll_resilience.py
          tests/test_telegram_live_provider.py

  ws4-context-onpath:
    # WS4 PR4b: mandatory ON-path job (flag-promotion rule, ref #641). Runs the
    # WS4 proactive-context-recovery suite with the live-plugin flags ON in a
    # hermetic env-cleared run so an exported MAGI_* / provider key cannot give a
    # false green. Tier-7 uses the hermetic stub summarizer (no model call).
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps (dev + cli extras)
        run: uv sync --python 3.12 --extra dev --extra cli
      - name: WS4 proactive context recovery (ON-path, hermetic, env-cleared)
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_CONTEXT_PROACTIVE_RECOVERY_ENABLED=1
          MAGI_CONTEXT_COMPACTION_ENABLED=1
          uv run --no-sync pytest -q
          tests/test_context_compaction_proactive.py
          tests/test_ws4_proactive_activation.py

  ws6-onpath:
    # WS6 PR6c: mandatory ON-path job (flag-promotion rule; "OFF is
    # byte-identical" is necessary but not sufficient, ref incident #641/#650).
    # Runs the WS6 deterministic-verification suites with the WS6 lab flags ON in
    # a hermetic, env-cleared run so Kevin's exported MAGI_* + provider keys
    # cannot give a false green. The job sets the flags DIRECTLY (the explicit ON
    # set that mirrors the lab seed) rather than relying on MAGI_RUNTIME_PROFILE
    # =lab, so the assertion is on the flags themselves.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps (dev + cli extras)
        run: uv sync --python 3.12 --extra dev --extra cli
      - name: WS6 deterministic-verification suite (ON-path, hermetic, env-cleared)
        # ``env -i`` drops every inherited MAGI_* / provider key, then we set
        # ONLY the WS6 lab flags ON (an explicit allowlist). These suites are
        # robust under the global flags: the soft-consequence + completion-tie
        # behaviour is proven directly from the flag state. PR6c's goal_nudge tie
        # asserts NO terminal at the nudge point and that the goal_nudge status
        # event carries the evidence-reason fields with no reserved delta key.
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_RESEARCH_GOVERNANCE_SOFT_BLOCK_ENABLED=1
          MAGI_EVIDENCE_HEDGE_ON_GUESS_ENABLED=1
          MAGI_FACT_GROUNDING_VERIFICATION_ENABLED=1
          MAGI_FINAL_OUTPUT_GATE_LOCAL_ENABLED=1
          uv run --no-sync pytest -q
          tests/runtime/test_goal_nudge_evidence_tie.py
          tests/runtime/test_evidence_hedge_pairing_guard.py
          tests/evidence/test_final_output_gate_local_enable.py
          tests/research/test_live_research_final_gate_wiring.py
          tests/cli/test_engine_fact_grounding_hedge.py
      - name: WS6 research-governance soft-notice suite (hermetic, env-cleared)
        # This file pairs ON-path soft-notice tests with OFF-path
        # byte-identical/fail-open tests that assert the hard refuse with the
        # hedge flag OFF; each test self-manages its WS6 flags via monkeypatch.
        # It therefore runs env-cleared WITHOUT job-wide flag forcing (forcing
        # the hedge flag globally would override its OFF-path assertions). The
        # env-clear is the source-of-truth hermeticity guarantee (#650).
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          uv run --no-sync pytest -q
          tests/cli/test_engine_research_soft_notice.py

  ws3-goal-on-path:
    # WS3 PR3c: mandatory ON-path job (flag-promotion rule; "OFF is
    # byte-identical" is necessary but not sufficient, ref incident #641). PR3c
    # flips MAGI_PLAN_LEDGER_DURABLE_ENABLED + MAGI_GOAL_COMPLETION_EVIDENCE_FIRST_ENABLED
    # ON for the full local profile. TWO invocations run the WS3 suite in a
    # hermetic, env-cleared run (``env -i`` drops Kevin's exported MAGI_* +
    # provider keys so they cannot give a false green, R4):
    #   1. LAB (SEAM 1 + SEAM 3): also sets MAGI_GOAL_LOOP_ENABLED=1, so the
    #      pre-judge short-circuit and the budget/max-turns goal_paused wrap that
    #      live INSIDE the goal-loop guard are exercised.
    #   2. FULL (SEAM 2, the shipped "full" deliverable): leaves
    #      MAGI_GOAL_LOOP_ENABLED UNSET (env -i never sets it), so goal_loop_policy
    #      is None and the ledger-all-complete -> done short-circuit + the honest
    #      pre-judge pause run under the ACTUAL full wiring. This second invocation
    #      is mandatory: without it the loop-OFF SEAM-2 tests would exist in the
    #      suite but never run under loop-OFF in CI (the arch-tdd trap of the
    #      WS3 design 4.4). The judge_caller is a scripted fake; no model call.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps (dev + cli extras)
        run: uv sync --python 3.12 --extra dev --extra cli
      - name: WS3 goal/ledger suite (FULL profile, SEAM 2, loop OFF)
        # MAGI_GOAL_LOOP_ENABLED is intentionally NOT set: goal_loop_policy is
        # None, so the SEAM-2 ledger-all-complete -> done and pre-judge pause are
        # the shipped "full" deliverable under test. MAGI_GOAL_NUDGE_ENABLED is
        # also unset to prove Reader 2 independence (design 4.5).
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_PLAN_LEDGER_DURABLE_ENABLED=1
          MAGI_GOAL_COMPLETION_EVIDENCE_FIRST_ENABLED=1
          uv run --no-sync pytest -q
          tests/runtime/test_plan_ledger.py
          tests/runtime/test_goal_loop_evidence.py
          tests/cli/test_engine_goal_pause.py
          tests/test_ws3_goal_activation.py
      - name: WS3 goal/ledger suite (LAB, SEAM 1 + SEAM 3, judge loop ON)
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_PLAN_LEDGER_DURABLE_ENABLED=1
          MAGI_GOAL_COMPLETION_EVIDENCE_FIRST_ENABLED=1
          MAGI_GOAL_LOOP_ENABLED=1
          uv run --no-sync pytest -q
          tests/runtime/test_plan_ledger.py
          tests/runtime/test_goal_loop_evidence.py
          tests/cli/test_engine_goal_pause.py
          tests/test_ws3_goal_activation.py

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # web-dashboard freshness gate diffs against origin/base
      - name: Naming-leak ratchet gate
        run: bash scripts/check_naming.sh
      - name: Web-dashboard bundle freshness gate
        run: bash scripts/check_web_dashboard_freshness.sh
      - name: Web-dashboard chunks resolvable gate
        run: bash scripts/check_dashboard_chunks_resolvable.sh
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps (dev extra)
        run: uv sync --extra dev
      - name: Ruff (stage-1 fatal subset, blocking)
        run: uv run --no-sync ruff check .
      - name: Module map drift gate
        run: bash scripts/check_module_map.sh
      - name: env-reference drift gate
        run: bash scripts/check_env_reference.sh
      - name: Design-system drift gate
        run: node scripts/check-ds-drift.mjs apps/web/src/components/ui/_ds
      - name: xfail budget ratchet gate
        run: uv run --no-sync python scripts/check_xfail_budget.py
      - name: direct flag-read ratchet gate
        run: uv run --no-sync python scripts/check_flag_reads.py
      - name: Mypy (advisory, non-blocking)
        run: uv run --no-sync mypy magi_agent
        continue-on-error: true
