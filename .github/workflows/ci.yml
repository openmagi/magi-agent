name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install ${{ matrix.python-version }}
      - name: Sync deps (dev + cli extras)
        run: uv sync --python ${{ matrix.python-version }} --extra dev --extra cli
      - name: Run tests
        env:
          # Hermetic: never read a developer/CI host ~/.magi/config.toml
          MAGI_CONFIG: ${{ runner.temp }}/magi-ci-config.toml
        run: uv run --no-sync pytest -q

  ws1-durable-on-path:
    # WS1 PR1e: mandatory ON-path job (flag-promotion rule; "OFF is
    # byte-identical" is necessary but not sufficient, ref incident #641). Runs
    # the WS1 durable suite with the durable / work-queue flags ON in a hermetic,
    # env-cleared run so Kevin's exported MAGI_* + provider keys cannot give a
    # false green (R4). A second run additionally flips the OPTIONAL
    # MAGI_DURABLE_FOREGROUND_CONTINUATION_ENABLED on so the context-only
    # continuation path is covered too.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps (dev + cli extras)
        run: uv sync --python 3.12 --extra dev --extra cli
      - name: WS1 durable suite (ON-path, hermetic, env-cleared)
        # ``env -i`` drops every inherited MAGI_* / provider key, then we set
        # ONLY the WS1 flags ON (an explicit allowlist). MAGI_CLI_SESSION_LOG_ENABLED
        # is the Envelope-log TEXT source for the context-only foreground resume
        # (NOT the obs MAGI_SESSION_TRANSCRIPT_ENABLED); MAGI_EVIDENCE_LEDGER_LIFECYCLE_ENABLED
        # is the shipped-profile value the armed-gate digest test requires.
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_DURABLE_LOCAL_WRITES_ENABLED=1
          MAGI_DURABLE_CHECKPOINTS_ENABLED=1
          MAGI_DURABLE_STARTUP_RECOVERY_ENABLED=1
          MAGI_WORK_QUEUE_EXECUTOR_ENABLED=1
          MAGI_CLI_SESSION_LOG_ENABLED=1
          MAGI_EVIDENCE_LEDGER_LIFECYCLE_ENABLED=1
          uv run --no-sync pytest -q
          tests/test_ws1_durable_activation.py
          tests/test_durable_checkpoint_store.py
          tests/test_durable_checkpoint_emitter.py
          tests/test_durable_recovery_sweep.py
          tests/test_durable_side_effects.py
          tests/test_work_queue_boot_reclaim.py
      - name: WS1 durable suite (ON-path + foreground continuation)
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_DURABLE_LOCAL_WRITES_ENABLED=1
          MAGI_DURABLE_CHECKPOINTS_ENABLED=1
          MAGI_DURABLE_STARTUP_RECOVERY_ENABLED=1
          MAGI_DURABLE_FOREGROUND_CONTINUATION_ENABLED=1
          MAGI_WORK_QUEUE_EXECUTOR_ENABLED=1
          MAGI_CLI_SESSION_LOG_ENABLED=1
          MAGI_EVIDENCE_LEDGER_LIFECYCLE_ENABLED=1
          uv run --no-sync pytest -q
          tests/test_ws1_durable_activation.py
          tests/test_durable_recovery_sweep.py

  ws5-empty-response-onpath:
    # WS5 PR5a: mandatory ON-path job (flag-promotion rule, ref #641). Runs the
    # empty-response recovery suites with the flag ON in a hermetic env-cleared
    # run so an exported MAGI_* / provider key cannot give a false green.
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync deps (dev + cli extras)
        run: uv sync --python 3.12 --extra dev --extra cli
      - name: WS5 empty-response recovery (ON-path, hermetic, env-cleared)
        run: >
          env -i HOME="$HOME" PATH="$PATH"
          MAGI_CONFIG="${{ runner.temp }}/magi-ci-config.toml"
          MAGI_EMPTY_RESPONSE_RECOVERY_ENABLED=1
          uv run --no-sync pytest -q
          tests/test_ws5_empty_response_activation.py
          tests/runtime/test_empty_response_recovery.py
          tests/cli/test_engine_empty_response_recovery.py

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # web-dashboard freshness gate diffs against origin/base
      - name: Naming-leak ratchet gate
        run: bash scripts/check_naming.sh
      - name: Web-dashboard bundle freshness gate
        run: bash scripts/check_web_dashboard_freshness.sh
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync deps (dev extra)
        run: uv sync --extra dev
      - name: Ruff (stage-1 fatal subset, blocking)
        run: uv run --no-sync ruff check .
      - name: Module map drift gate
        run: bash scripts/check_module_map.sh
      - name: env-reference drift gate
        run: bash scripts/check_env_reference.sh
      - name: Design-system drift gate
        run: node scripts/check-ds-drift.mjs apps/web/src/components/ui/_ds
      - name: xfail budget ratchet gate
        run: uv run --no-sync python scripts/check_xfail_budget.py
      - name: direct flag-read ratchet gate
        run: uv run --no-sync python scripts/check_flag_reads.py
      - name: Mypy (advisory, non-blocking)
        run: uv run --no-sync mypy magi_agent
        continue-on-error: true
