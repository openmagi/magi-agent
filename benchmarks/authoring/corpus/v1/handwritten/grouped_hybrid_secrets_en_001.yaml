schema_version: 1
id: grouped_hybrid_secrets_en_001
flow: single_rule
archetype: grouped_hybrid
language: en
turn_budget: 4
# No conversation: exercises the FE grouped-save contract (N PUT custom-rules
# stamped with groupId, then one PUT /policies/{groupId}). Per-rule promotion is
# skipped for grouped saves so exactly ONE policy references both rules.
turns: []
save: grouped
grouped_save:
  group_id: grp_secrets_001
  display_name: "No secrets in output"
  intent: "never print AWS keys and redact them from tool output"
  rules:
    - scope: always
      enabled: true
      firesAt: after_tool_use
      action: audit
      what:
        kind: output_rewrite
        payload:
          mode: redact
          pattern: "AKIA[0-9A-Z]{16}"
          replacement: "***"
    - scope: always
      enabled: true
      firesAt: pre_final
      action: block
      what:
        kind: llm_criterion
        payload:
          criterion: "Does the reply contain a credential?"
oracle:
  expect_ready: false
  persisted:
    group_single_policy: true
    no_double_representation: true
    catalog_consistent: true
