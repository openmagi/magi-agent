schema_version: 1
id: policy_linked_fetch_gate_en_001
flow: linked_policy
archetype: linked
language: en
turn_budget: 4
turns:
  - say: "require a verified source from europa.eu before publish_report runs"
  - say: "the source credibility label"
llm_script:
  - '{"assistant_message": "One more detail.", "param_updates": {"gatedTool": "publish_report", "allowlistDomains": ["europa.eu"]}, "questions": ["What are you verifying?"]}'
  - '{"assistant_message": "Done.", "param_updates": {"evidenceLabel": "source credibility"}}'
save: from_plan
oracle:
  expect_ready: true
  max_turns_to_ready: 2
  plan:
    gate.what.payload.match.tool: publish_report
    gate.what.payload.requireEvidence.onEvidenceUnavailable: deny
    producer.trigger.domainAllowlist: [europa.eu]
  persisted:
    from_plan_triple: true
    policy_intent_is_first_utterance: true
    no_orphan_rules: true
  forbidden_strings: default
