schema_version: 1
id: rule_happy_toolperm_en_001
flow: single_rule
archetype: happy_path
language: en
turn_budget: 4
# HEAD-compat: route A's live LLM path is dead at 60bc91f8a, so the structured
# payload the compiler would have built is provided via seed_draft and the
# vocabulary fields converge deterministically through answers.
seed_draft:
  what:
    payload:
      match: {tool: Bash}
      decision: deny
turns:
  - say: "block the Bash tool"
    answers: {q_what.kind: tool_perm}
  - answers: {q_action: block, q_scope: always}
save: envelope
oracle:
  expect_ready: true
  max_turns_to_ready: 2
  draft:
    what.kind: tool_perm
    firesAt: before_tool_use
    action: block
    scope: always
  persisted:
    rule_valid_and_clean: true
    policy_intent_is_first_utterance: true
    no_orphan_rules: true
    catalog_consistent: true
  forbidden_strings: default
