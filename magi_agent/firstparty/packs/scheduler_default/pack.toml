# Bundled first-party schedule policy (cron-grammar 'which job / when').
# Same loader/format as a user pack; override/forbid by re-declaring or
# disabling this ref (§1). Mechanism (file lock, lease validation, at-most-once
# record_advance-before-receipt ordering, receipts) stays kernel.
# Schema = magi_agent/packs/manifest.py (top-level packId/displayName).

packId = "openmagi.scheduler-default"
displayName = "Schedule policy (cron grammar)"
version = "1.0.0"
description = "First-party 'which job / when' policy bundled as a removable pack."

[[provides]]
type = "schedule_policy"
ref = "schedule_policy:cron@1"
impl = "magi_agent.firstparty.packs.scheduler_default.impl:provide_cron_policy"
