# Bundled first-party control_plane pack (no privilege; same loader/format a user
# control_plane pack uses, D1/D3). This is the de-privileging keystone: the 6
# first-party LoopControls are discovered+loaded from THIS pack.toml instead of
# being hand-assembled inside build_default_plugin. A user control_plane pack in
# ~/.magi/packs loads through the identical path and registers in parallel.
#
# Schema = magi_agent/packs/manifest.py (top-level packId/displayName). control_plane
# is an ordered type; gate_position defaults to "after" the permission gate (these
# controls never decide before_tool, so they are correctly gated after the gate).
# The impl delegates to build_default_plane — the migration is a MOVE, not a
# rewrite, so behavior is byte-identical (Phase-0 golden stays green).

packId = "openmagi.control-plane-default"
displayName = "Default control plane"
version = "1.0.0"
description = "First-party default LoopControls (edit-retry, resilience, compaction, max-steps, self-review, GA reminder) bundled as a removable pack."

[[provides]]
type = "control_plane"
ref = "control_plane:default@1"
impl = "magi_agent.firstparty.packs.control_plane_default.impl:provide_default_controls"
priority = 0
phase = "loop"
gatePosition = "after"
