services:
  magi-agent:
    build: .
    image: openmagi/magi-agent:local
    env_file:
      - .env
    command: ["node", "dist/cli/index.js", "serve", "--port", "8080"]
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      MAGI_AGENT_APP_ROOT: /app/apps/web
    volumes:
      - magi-workspace:/home/ocuser/.magi/workspace
      - ./magi-agent.yaml:/app/magi-agent.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  magi-workspace:
